<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WAZIQOH · Cek Pembayaran</title>

    <!-- ================== FAVICON ================== -->
    <link rel="icon" href="https://i.ibb.co/q37GwCZ7/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/q37GwCZ7/favicon.png" sizes="180x180">
    
    <!-- ================== OPEN GRAPH ================== -->
    <meta property="og:title" content="Bukti Pembayaran WAZIQOH">
    <meta property="og:description" content="Terima kasih telah menyalurkan sebagian hartanya melalui WAZIQOH KMB Mesir">
    <meta property="og:image" content="https://i.ibb.co/hFW33J0c/waziqoh.png">
    <meta property="og:url" content="https://nuraddiniy99.github.io/mustahiqkmb26/viewer.html">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- jsPDF & autotable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.3/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f7f3;
            min-height: 100vh;
            padding: 20px 16px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            margin-top: 50px;
        }

        /* Modern Card Style */
        .card {
            background: #ffffff;
            border-radius: 32px;
            padding: 28px 22px;
            box-shadow: 0 20px 40px -12px rgba(15, 123, 84, 0.25);
            margin-bottom: 24px;
            border: 1px solid rgba(15, 123, 84, 0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* decorative element */
        .card::before {
            content: "";
            position: absolute;
            top: -30px;
            right: -30px;
            width: 150px;
            height: 150px;
            background: rgba(15, 123, 84, 0.03);
            border-radius: 50%;
            z-index: 0;
        }

        /* Header - akan disembunyikan di awal */
        .app-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            background: #ffffff;
            border-radius: 100px;
            padding: 12px 18px 12px 12px;
            box-shadow: 0 8px 20px rgba(15, 123, 84, 0.12);
            border: 1px solid #d0e6dc;
            position: relative;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .logo-kiri {
            width: 52px;
            height: 52px;
            background: url('https://i.ibb.co/q37GwCZ7/favicon.png') center/contain no-repeat;
            background-size: contain;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 6px rgba(15,123,84,0.2));
        }

        .header-titles {
            flex: 1;
        }

        .header-titles h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #0f3b2c;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-titles .sub {
            color: #547a66;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }

        .badge {
            background: #e2f0e9;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.7rem;
            color: #0f5e3f;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Hero Badge - disembunyikan di awal */
        .hero-badge {
            background: linear-gradient(135deg, #0f7b54 0%, #1a9b6d 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            box-shadow: 0 6px 12px rgba(15,123,84,0.25);
            transition: all 0.3s ease;
        }

        /* ===== HALAMAN AWAL (hanya logo + input) ===== */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 380px;
            text-align: center;
            z-index: 5;
        }

        .welcome-logo {
            width: 180px;
            height: auto;
            margin-bottom: 32px;
            animation: gentleFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 16px 20px rgba(15,123,84,0.2));
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
        }

        .welcome-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f3b2c;
            margin-bottom: 12px;
        }

        .welcome-sub {
            color: #547a66;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .invoice-input-wrapper {
            width: 100%;
            background: #ffffff;
            border-radius: 60px;
            padding: 6px 6px 6px 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #c0e0d2;
            box-shadow: 0 8px 18px -6px rgba(15,123,84,0.25);
            margin-top: 8px;
        }

        .invoice-input-wrapper i {
            color: #ffffff;
            font-size: 1.2rem;
        }

        #invoiceInput {
            border: none;
            background: transparent;
            padding: 16px 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f3b2c;
            letter-spacing: 0.5px;
            flex: 1;
            min-width: 0;
            outline: none;
            font-family: 'Inter', monospace;
        }

        #invoiceInput::placeholder {
            color: #a0c4b2;
            font-weight: 400;
            font-size: 0.95rem;
        }

        .btn-cek {
            background: #0f7b54;
            border: none;
            border-radius: 50px;
            padding: 14px 28px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(15,123,84,0.3);
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-cek:hover {
            background: #0b6845;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(15,123,84,0.4);
        }

        .hint-text {
            color: #6d8f7e;
            font-size: 0.8rem;
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: #ecf6f1;
            padding: 8px 20px;
            border-radius: 60px;
        }

        /* Tampilan Invoice (bukti) */
        .invoice-showcase {
            background: linear-gradient(145deg, #f9fffc 0%, #eefaf4 100%);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            border: 2px dashed #0f7b54;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .invoice-number-large {
            font-size: 2.2rem;
            font-weight: 800;
            color: #0f7b54;
            letter-spacing: 1px;
            line-height: 1;
            word-break: break-word;
        }

        .invoice-label {
            color: #547a66;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .nama-large {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f3b2c;
            margin: 8px 0 4px;
        }

        .kekeluargaan-badge {
            background: #daf1e6;
            color: #0f5e3f;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 16px;
        }

        .payment-breakdown {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin: 24px 0;
            border: 1px solid #d0e6dc;
            box-shadow: 0 4px 12px rgba(15,123,84,0.05);
        }

        .breakdown-title {
            font-weight: 600;
            color: #0f7b54;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #d9e9e1;
        }

        .breakdown-item:last-child {
            border-bottom: none;
        }

        .breakdown-type {
            font-weight: 500;
            color: #2e5e45;
        }

        .breakdown-nominal {
            font-weight: 700;
            color: #0f7b54;
            font-size: 1.1rem;
        }

        .total-all {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2px solid #0f7b54;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-all-label {
            font-weight: 700;
            color: #1e3a2f;
            font-size: 1.1rem;
        }

        .total-all-value {
            font-weight: 800;
            color: #0f7b54;
            font-size: 1.5rem;
            text-align: right;
        }

        .method-badge {
            background: #e9f2ed;
            border-radius: 30px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #1e4d37;
        }

        .btn-download {
            background: linear-gradient(145deg, #0f7b54, #0b6845);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 20px 24px;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 12px 24px -8px rgba(15,123,84,0.5);
            margin: 24px 0 16px;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 5;
        }

        .btn-download:hover {
            background: linear-gradient(145deg, #0b6845, #095737);
            transform: scale(1.02);
            box-shadow: 0 16px 28px -6px rgba(15,123,84,0.6);
        }

        .footer-note {
            text-align: center;
            color: #7a9b8b;
            font-size: 0.8rem;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .global-loading {
            position: fixed;
            inset: 0;
            background: rgba(248, 250, 252, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .global-loading.active {
            display: flex;
        }

        .loading-content {
            text-align: center;
            padding: 24px 40px;
        }

        .loading-logo {
            width: 140px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 16px;
            animation: pulse-slow 4.5s ease-in-out infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.15); }
        }

        .loading-text {
            color: #0f7b54;
            font-weight: 700;
            font-size: 1.15rem;
        }

        .not-found {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 32px;
            color: #64748b;
        }

        .watermark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            opacity: 0.1;
            font-size: 3rem;
            font-weight: 800;
            color: #0f7b54;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 0;
        }

        .hidden {
            display: none !important;
        }

        /* Animasi transisi */
        .fade-transition {
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Loading Overlay -->
        <div id="globalLoading" class="global-loading">
            <div class="loading-content">
                <img src="https://i.ibb.co/5XnDzfNS/Asset-3.png" alt="Loading Logo" class="loading-logo">
                <div class="loading-text">Memuat bukti pembayaran...</div>
            </div>
        </div>

        <!-- Header (disembunyikan awal) -->
        <div id="appHeader" class="app-header hidden">
            <div class="logo-kiri"></div>
            <div class="header-titles">
                <h1><i class="fas fa-check-circle" style="color:#0f7b54;"></i> Bukti Pembayaran</h1>
                <div class="sub">
                    <span class="badge"><i class="fas fa-leaf"></i> WAZIQOH KMB Mesir</span>
                    <span><i class="far fa-clock"></i> <span id="liveTime"></span></span>
                </div>
            </div>
        </div>

        <!-- Hero Badge (disembunyikan awal) -->
        <div id="heroBadge" class="hero-badge hidden">
            <i class="fas fa-hand-holding-heart"></i> Terima kasih telah menyalurkan sebagian hartanya melalui WAZIQOH KMB Mesir
        </div>

        <!-- CARD UTAMA -->
        <div class="card" id="mainCard">
            <!-- HALAMAN AWAL: logo + input invoice (selalu tampil awal) -->
            <div id="welcomeBlock" class="welcome-screen">
                <img src="https://i.ibb.co/5XnDzfNS/Asset-3.png" alt="WAZIQOH" class="welcome-logo">
                <div class="welcome-title">Cek Bukti Pembayaran</div>
                <div class="welcome-sub">Masukkan nomor invoice untuk melihat detail</div>
                
                <div class="invoice-input-wrapper">
                    <i class="fas fa-receipt"></i>
                    <input type="text" id="invoiceInput" placeholder="INV/2026/xxx" value="INV/2026/00" autocomplete="off">
                    <button class="btn-cek" id="cekInvoiceBtn">
                        <i class="fas fa-search"></i> Cek
                    </button>
                </div>
                
                <div class="hint-text">
                    <i class="fas fa-lightbulb"></i> Contoh: INV/2026/001 , INV/2026/002
                </div>
            </div>

            <!-- BUKTI PEMBAYARAN (konten dinamis) awalnya tersembunyi -->
            <div id="buktiBlock" class="hidden">
                <div id="buktiContent">
                    <!-- akan diisi JS -->
                </div>
            </div>
        </div>

        <!-- Tombol Unduh PDF (tersembunyi awal) -->
        <button id="downloadPDFBtn" class="btn-download hidden">
            <i class="fas fa-file-pdf"></i> Unduh Kwitansi PDF
            <i class="fas fa-arrow-right"></i>
        </button>

        <!-- Informasi tambahan (tetap ada, tapi disesuaikan) -->
        <div class="footer-note">
            <i class="fas fa-shield-alt" style="color:#0f7b54;"></i> 
            <span>WAZIQOH KMB Mesir — Official Payment Receipt</span>
        </div>
    </div>

    <!-- Watermark -->
    <div class="watermark">WAZIQOH</div>

    <script>
        // ============================================
        // KONFIGURASI
        // ============================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwTh0vJfVQSFCqWZjn6fPc4vjBTlJCDqqV_KELPteH07ptRmqfqewEOgXE1gQrws-aP/exec';

        let currentPayment = null;
        let allPayments = [];

        // Elemen yang akan disembunyikan/tampil
        const welcomeBlock = document.getElementById('welcomeBlock');
        const buktiBlock = document.getElementById('buktiBlock');
        const appHeader = document.getElementById('appHeader');
        const heroBadge = document.getElementById('heroBadge');
        const downloadBtn = document.getElementById('downloadPDFBtn');
        const invoiceInput = document.getElementById('invoiceInput');
        const cekBtn = document.getElementById('cekInvoiceBtn');
        const loading = document.getElementById('globalLoading');

        // ========== FUNGSI LOAD DATA ==========
        async function fetchAllPayments() {
            if (allPayments.length > 0) return allPayments;
            try {
                const response = await fetch(APPS_SCRIPT_URL + '?action=getAll');
                const result = await response.json();
                if (result.success && Array.isArray(result.data)) {
                    allPayments = result.data;
                    return allPayments;
                } else throw new Error('Gagal ambil data');
            } catch (err) {
                console.error('fetch error', err);
                return [];
            }
        }

        function setLoading(show) {
            if (show) loading.classList.add('active');
            else loading.classList.remove('active');
        }

        // Render bukti pembayaran
        function renderBukti(p) {
            const formatRupiah = (num) => new Intl.NumberFormat('id-ID').format(num);

            const totals = {};
            if (Array.isArray(p.jenis)) {
                p.jenis.forEach(item => {
                    const curr = item.currency || 'EGP';
                    totals[curr] = (totals[curr] || 0) + (item.nominal || 0);
                });
            }

            let breakdownHtml = '';
            if (Array.isArray(p.jenis)) {
                p.jenis.forEach(item => {
                    const type = item.type || item.customLabel || 'Lainnya';
                    const nominal = item.nominal || 0;
                    const curr = item.currency || 'EGP';
                    breakdownHtml += `
                        <div class="breakdown-item">
                            <span class="breakdown-type">${type}</span>
                            <span class="breakdown-nominal">${formatRupiah(nominal)} ${curr}</span>
                        </div>
                    `;
                });
            }

            let totalHtml = '';
            for (let curr in totals) {
                totalHtml += `<div>${formatRupiah(totals[curr])} ${curr}</div>`;
            }

            const tgl = p.timestamp ? new Date(p.timestamp) : new Date();
            const tanggalStr = tgl.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });

            const metode = p.metode || 'Tunai';
            const metodeIcon = metode === 'Tunai' ? 'fa-money-bill-wave' : 'fa-exchange-alt';

            const content = `
                <div style="position: relative; z-index: 2;">
                    <div class="invoice-showcase">
                        <div class="invoice-label">NOMOR INVOICE</div>
                        <div class="invoice-number-large">${p.invoiceNumber || 'INV/2026/000'}</div>
                    </div>

                    <div class="nama-large">${p.nama || 'Nama tidak tersedia'}</div>
                    <div class="kekeluargaan-badge"><i class="fas fa-users"></i> ${p.kekeluargaan || 'KMB'}</div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <div class="detail-label"><i class="far fa-calendar-alt" style="color:#0f7b54;"></i> ${tanggalStr}</div>
                        <div class="method-badge"><i class="fas ${metodeIcon}"></i> ${metode}</div>
                    </div>

                    <div class="payment-breakdown">
                        <div class="breakdown-title">
                            <i class="fas fa-receipt"></i> Rincian Pembayaran
                        </div>
                        ${breakdownHtml}
                        <div class="total-all">
                            <span class="total-all-label">TOTAL</span>
                            <div class="total-all-value">${totalHtml}</div>
                        </div>
                    </div>

                    <div style="background: #f2faf6; border-radius: 20px; padding: 16px; margin-top: 12px; text-align: center; border-left: 5px solid #0f7b54;">
                        <i class="fas fa-quote-right" style="color:#0f7b54; opacity:0.4; font-size:2rem; margin-bottom:8px;"></i>
                        <p style="font-style: italic; color:#2e5e45;">"Terima kasih ${p.nama || ''} telah menyalurkan sebagian hartanya melalui WAZIQOH. Semoga menjadi berkah dan manfaat."</p>
                    </div>
                </div>
            `;
            document.getElementById('buktiContent').innerHTML = content;
        }

        // Fungsi untuk menampilkan bukti & elemen pendukung
        function showPaymentResult(payment) {
            currentPayment = payment;
            renderBukti(payment);

            // Sembunyikan welcome, tampilkan blok bukti + header + hero + tombol
            welcomeBlock.classList.add('hidden');
            buktiBlock.classList.remove('hidden');
            appHeader.classList.remove('hidden');
            heroBadge.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
        }

        // Fungsi untuk kembali ke welcome (jika error / tidak ditemukan)
        function showWelcomeOnly() {
            welcomeBlock.classList.remove('hidden');
            buktiBlock.classList.add('hidden');
            appHeader.classList.add('hidden');
            heroBadge.classList.add('hidden');
            downloadBtn.classList.add('hidden');
        }

        // Cek invoice berdasarkan nomor
        async function cekInvoice(invoiceNumber) {
            if (!invoiceNumber) {
                alert('Masukkan nomor invoice');
                return;
            }

            setLoading(true);

            try {
                const data = await fetchAllPayments();
                const payment = data.find(p => p.invoiceNumber === invoiceNumber);

                if (payment) {
                    showPaymentResult(payment);
                } else {
                    alert(`Invoice ${invoiceNumber} tidak ditemukan.`);
                    showWelcomeOnly(); // tetap di welcome
                }
            } catch (err) {
                alert('Gagal memuat data. Periksa koneksi.');
                showWelcomeOnly();
            } finally {
                setLoading(false);
            }
        }

        // ========== HANDLE URL PARAMETER ==========
        function handleUrlParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const invParam = urlParams.get('invoice');
            if (invParam) {
                invoiceInput.value = invParam;
                cekInvoice(invParam);
            } else {
                // Tidak ada parameter, pastikan hanya welcome yang tampil
                showWelcomeOnly();
            }
        }

        // ========== DOWNLOAD PDF (sama persis) ==========
        window.downloadKwitansi = function() {
            if (!currentPayment) {
                alert('Data pembayaran tidak ditemukan');
                return;
            }

            const payment = currentPayment;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });

            const softGreen = [236, 249, 231];
            const textDark = [30, 41, 59];
            const primaryGreen = [15, 123, 84];
            const accentLine = [203, 213, 225];

            doc.setFillColor(softGreen[0], softGreen[1], softGreen[2]);
            doc.roundedRect(15, 15, 180, 40, 4, 4, 'F');

            const logoUrl = 'https://i.ibb.co/5XnDzfNS/Asset-3.png';

        function numberToWordsIndonesia(num) {
            if (num == 0 || isNaN(num)) return 'nol';
            num = Math.round(Math.abs(num));
            const satuan  = ['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan'];
            const belasan = ['sepuluh','sebelas','dua belas','tiga belas','empat belas','lima belas','enam belas','tujuh belas','delapan belas','sembilan belas'];
            const puluhan = ['','','dua puluh','tiga puluh','empat puluh','lima puluh','enam puluh','tujuh puluh','delapan puluh','sembilan puluh'];
            function convert(n) {
                if (n===0) return '';
                if (n<10) return satuan[n];
                if (n<20) return belasan[n-10];
                if (n<100) {
                    let p = Math.floor(n/10), s=n%10;
                    let res = puluhan[p];
                    if (s>0) res += (res?' ':'')+satuan[s];
                    return res;
                }
                if (n<200) return 'seratus' + (n>100? ' '+convert(n-100):'');
                if (n<1000) return satuan[Math.floor(n/100)] + ' ratus' + (n%100? ' '+convert(n%100):'');
                if (n<2000) return 'seribu' + (n>1000? ' '+convert(n-1000):'');
                if (n<1000000) return convert(Math.floor(n/1000)) + ' ribu' + (n%1000? ' '+convert(n%1000):'');
                if (n<1000000000) return convert(Math.floor(n/1000000)) + ' juta' + (n%1000000? ' '+convert(n%1000000):'');
                return n.toString();
            }
            return convert(num);
        }
