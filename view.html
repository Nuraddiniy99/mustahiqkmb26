        /* Modern Card Style */

    <script>
        // ============================================
        // KONFIGURASI APPS SCRIPT ENDPOINT (sama)
        // ============================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwTh0vJfVQSFCqWZjn6fPc4vjBTlJCDqqV_KELPteH07ptRmqfqewEOgXE1gQrws-aP/exec';

        let currentPayment = null; // menyimpan data pembayaran yang ditampilkan

        // Ambil parameter dari URL (?invoice=INV/2026/001)
        function getInvoiceFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('invoice');
        }

        // Load data dan tampilkan berdasarkan invoice
        async function loadPaymentData() {
            showGlobalLoading(true);

            const invoiceNumber = getInvoiceFromUrl();
            if (!invoiceNumber) {
                // Tidak ada invoice di URL
                document.getElementById('buktiContent').innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-search"></i>
                        <h3 style="margin-bottom: 8px;">Tidak ada nomor invoice</h3>
                        <p style="color: #64748b;">Gunakan tautan dengan parameter ?invoice=INV/2026/xxx</p>
                    </div>
                `;
                showGlobalLoading(false);
                return;
            }

            try {
                const response = await fetch(APPS_SCRIPT_URL + '?action=getAll');
                const result = await response.json();

                if (result.success && result.data) {
                    // Cari payment dengan invoice yang cocok
                    const payment = result.data.find(p => p.invoiceNumber === invoiceNumber);

                    if (payment) {
                        currentPayment = payment;
                        renderBukti(payment);
                    } else {
                        document.getElementById('buktiContent').innerHTML = `
                            <div class="not-found">
                                <i class="fas fa-exclamation-circle"></i>
                                <h3 style="margin-bottom: 8px;">Data tidak ditemukan</h3>
                                <p style="color: #64748b;">Invoice: ${invoiceNumber}</p>
                                <p style="color: #64748b; font-size:0.9rem; margin-top:12px;">Pastikan nomor invoice benar</p>
                            </div>
                        `;
                    }
                } else {
                    throw new Error('Gagal memuat data');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('buktiContent').innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-plug"></i>
                        <h3>Gagal terhubung</h3>
                        <p style="color:#64748b;">Periksa koneksi atau coba lagi</p>
                    </div>
                `;
            } finally {
                showGlobalLoading(false);
            }
        }

        // Render tampilan bukti pembayaran (versi khusus viewer)
        function renderBukti(p) {
            // Format nominal untuk ditampilkan
            const formatRupiah = (num) => {
                return new Intl.NumberFormat('id-ID').format(num);
            };

            // Hitung total per currency
            const totals = {};
            if (Array.isArray(p.jenis)) {
                p.jenis.forEach(item => {
                    const curr = item.currency || 'EGP';
                    totals[curr] = (totals[curr] || 0) + (item.nominal || 0);
                });
            }

            // Buat daftar breakdown
            let breakdownHtml = '';
            if (Array.isArray(p.jenis)) {
                p.jenis.forEach(item => {
                    const type = item.type || item.customLabel || 'Lainnya';
                    const nominal = item.nominal || 0;
                    const curr = item.currency || 'EGP';
                    breakdownHtml += `
                        <div class="breakdown-item">
                            <span class="breakdown-type">${type}</span>
                            <span class="breakdown-nominal">${formatRupiah(nominal)} ${curr}</span>
                        </div>
                    `;
                });
            }

            // Total dalam berbagai mata uang
            let totalHtml = '';
            for (let curr in totals) {
                totalHtml += `<div class="total-all-value">${formatRupiah(totals[curr])} ${curr}</div>`;
            }

            // Tanggal
            const tgl = p.timestamp ? new Date(p.timestamp) : new Date();
            const tanggalStr = tgl.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });

            // Metode
            const metode = p.metode || 'Tunai';
            const metodeIcon = metode === 'Tunai' ? 'fa-money-bill-wave' : 'fa-exchange-alt';

            const content = `
                <div style="position: relative; z-index: 2;">
                    <!-- Invoice Number Large -->
                    <div class="invoice-showcase">
                        <div class="invoice-label">NOMOR INVOICE</div>
                        <div class="invoice-number-large">${p.invoiceNumber || 'INV/2026/000'}</div>
                    </div>

                    <!-- Nama & Kekeluargaan (lebih besar) -->
                    <div class="nama-large">${p.nama || 'Nama tidak tersedia'}</div>
                    <div class="kekeluargaan-badge"><i class="fas fa-users"></i> ${p.kekeluargaan || 'KMB'}</div>

                    <!-- Tanggal & Metode -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <div class="detail-label"><i class="far fa-calendar-alt" style="color:#0f7b54;"></i> ${tanggalStr}</div>
                        <div class="method-badge"><i class="fas ${metodeIcon}"></i> ${metode}</div>
                    </div>

                    <!-- Rincian Pembayaran -->
                    <div class="payment-breakdown">
                        <div class="breakdown-title">
                            <i class="fas fa-receipt"></i> Rincian Pembayaran
                        </div>
                        ${breakdownHtml}
                        <div class="total-all">
                            <span class="total-all-label">TOTAL</span>
                            <div style="text-align: right;">${totalHtml}</div>
                        </div>
                    </div>

                    <!-- Pesan Terima Kasih Personal -->
                    <div style="background: #f2faf6; border-radius: 20px; padding: 16px; margin-top: 12px; text-align: center; border-left: 5px solid #0f7b54;">
                        <i class="fas fa-quote-right" style="color:#0f7b54; opacity:0.4; font-size:2rem; margin-bottom:8px;"></i>
                        <p style="font-style: italic; color:#2e5e45;">"Terima kasih ${p.nama || ''} telah menyalurkan sebagian hartanya melalui WAZIQOH. Semoga menjadi berkah dan manfaat."</p>
                    </div>
                </div>
            `;

            document.getElementById('buktiContent').innerHTML = content;
        }

        // Fungsi download PDF (sama persis dengan versi asli, tapi disesuaikan sedikit untuk viewer)
        window.downloadKwitansi = function() {
            if (!currentPayment) {
                alert('Data pembayaran tidak ditemukan');
                return;
            }

            const payment = currentPayment;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });

            // Definisi Warna (sama persis)
            const softGreen = [236, 249, 231];
            const textDark = [30, 41, 59];
            const primaryGreen = [15, 123, 84];
            const accentLine = [203, 213, 225];

            // ===== HEADER UTAMA =====
            doc.setFillColor(softGreen[0], softGreen[1], softGreen[2]);
            doc.roundedRect(15, 15, 180, 40, 4, 4, 'F');

            const logoUrl = 'https://i.ibb.co/5XnDzfNS/Asset-3.png';
            const logoW = 50;
            const logoH = (648 / 1556) * logoW;
            try {
                doc.addImage(logoUrl, 'PNG', 22, 25, logoW, logoH);
            } catch (e) { console.error("Logo Error"); }

            doc.setTextColor(textDark[0], textDark[1], textDark[2]);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(15);
            doc.text('BADAN OTONOM (BO) - WAZIQOH', 78, 30);

            doc.setFontSize(12);
            doc.setFont('helvetica', 'normal');
            doc.text('KELUARGA MAHASISWA BANTEN MESIR', 78, 36);

            doc.setFontSize(8);
            doc.setTextColor(100, 116, 139);
            doc.text('Jl.‘Ainu Syams College, Gedung II, Lt. 3, No.5 Zahro, Nasr City, Kairo, Mesir', 78, 41);

            doc.setFillColor(primaryGreen[0], primaryGreen[1], primaryGreen[2]);
            doc.rect(15, 15, 2, 40, 'F');

            // ===== JUDUL KWITANSI =====
            doc.setTextColor(textDark[0], textDark[1], textDark[2]);
            doc.setFontSize(22);
            doc.setFont('helvetica', 'bold');
            doc.text('KWITANSI', 20, 70);
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(primaryGreen[0], primaryGreen[1], primaryGreen[2]);
            doc.text('OFFICIAL PAYMENT RECEIPT', 20, 75);

            doc.setTextColor(textDark[0], textDark[1], textDark[2]);
            doc.setFontSize(9);
            doc.text(`NO. INVOICE`, 150, 68);
            doc.setFont('helvetica', 'bold');
            doc.text(payment.invoiceNumber, 150, 73);

            doc.setFont('helvetica', 'normal');
            const tgl = new Date(payment.timestamp || Date.now());
            doc.text(tgl.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }), 150, 78);

            // Penerima - REVISI: nama + (kekeluargaan) di samping kanan

        // Fungsi numberToWordsIndonesia (sama persis)
        function numberToWordsIndonesia(num) {
            if (num == 0 || num == null || isNaN(num)) return 'nol';

            num = Math.round(Math.abs(num));

            const satuan  = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan'];
            const belasan = ['sepuluh', 'sebelas', 'dua belas', 'tiga belas', 'empat belas', 'lima belas', 
                            'enam belas', 'tujuh belas', 'delapan belas', 'sembilan belas'];
            const puluhan = ['', '', 'dua puluh', 'tiga puluh', 'empat puluh', 'lima puluh', 
                            'enam puluh', 'tujuh puluh', 'delapan puluh', 'sembilan puluh'];

            function convert(n) {
                if (n === 0) return '';

                if (n < 10) return satuan[n];

                if (n < 20) return belasan[n - 10];

                if (n < 100) {
                    const p = Math.floor(n / 10);
                    const s = n % 10;
                    let result = puluhan[p];
                    if (s > 0) result += (result ? ' ' : '') + satuan[s];
                    return result;
                }

                if (n < 200) {
                    let result = 'seratus';
                    const sisa = n - 100;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                if (n < 1000) {
                    const r = Math.floor(n / 100);
                    let result = satuan[r] + ' ratus';
                    const sisa = n % 100;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                if (n < 2000) {
                    let result = 'seribu';
                    const sisa = n - 1000;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                if (n < 1000000) {
                    let result = convert(Math.floor(n / 1000)) + ' ribu';
                    const sisa = n % 1000;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                if (n < 1000000000) {
                    let result = convert(Math.floor(n / 1000000)) + ' juta';
                    const sisa = n % 1000000;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                return n.toString();
            }

            return convert(num);
        }

        // Fungsi update live time (sama)
        function updateLiveTime() {

            const loader = document.getElementById('globalLoading');
            if (!loader) return;
            if (show) {

            } else {
