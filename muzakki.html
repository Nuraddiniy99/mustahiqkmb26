        /* Nominal Input per Jenis */
/* Nominal Input per Jenis - Versi Mobile Efisien */
.nominal-group {
    margin-bottom: 16px;
    padding: 12px;                /* dikurangi dari 16px */
    background: #f8fbf9;
    border-radius: 20px;
    border: 1px solid #d0e2d9;
}

.nominal-row {
    display: flex;
    align-items: center;
    gap: 8px;                     /* gap lebih kecil dari 12px */
    margin-bottom: 10px;          /* jarak antar baris lebih rapat */
}

.nominal-row:last-child {
    margin-bottom: 0;
}

.nominal-label {
    width: 80px;                  /* dikurangi dari 100px agar lebih compact */
    min-width: 80px;
    font-weight: 600;
    font-size: 0.85rem;           /* sedikit lebih kecil */
    color: #1e4d37;
    white-space: nowrap;          /* cegah label patah ke baris baru */
}

.nominal-input {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;                     /* gap lebih kecil */
    min-width: 0;                 /* penting agar bisa mengecil */
}

.nominal-input input {
    flex: 1 1 auto;               /* grow + shrink + basis auto */
    min-width: 80px;              /* minimal lebar agar tidak terlalu kecil */
    background: white;
    border: 1.5px solid #dde9e2;
    border-radius: 14px;          /* sedikit lebih kecil dari 16px */
    padding: 10px 12px;           /* padding lebih kecil dari 12px 16px */
    font-size: 0.95rem;           /* font sedikit lebih kecil */
    outline: none;
    font-family: 'Inter', sans-serif;
}

.nominal-input input:focus {
    border-color: #0f7b54;
    box-shadow: 0 0 0 3px rgba(15, 123, 84, 0.12);
}

.nominal-input input:disabled {
    background: #f0f5f2;
    opacity: 0.6;
}

.currency-select {
    width: 70px;                  /* lebih kecil dari 80px */
    min-width: 70px;
    background: #f9fcfa;
    border: 1.5px solid #dde9e2;
    border-radius: 14px;
    padding: 10px 8px;            /* padding lebih kecil */
    font-size: 0.9rem;
    outline: none;
    font-family: 'Inter', sans-serif;
    text-align: center;
}

.currency-select:focus {
    border-color: #0f7b54;
    box-shadow: 0 0 0 3px rgba(15, 123, 84, 0.12);
}

/* Khusus untuk Lainnya (custom label + input + currency) */
.nominal-row[data-type="Lainnya"] {
    flex-wrap: wrap;              /* agar custom label bisa turun jika terlalu panjang */
    align-items: flex-start;
}

.custom-label-input {
    flex: 1 1 100%;               /* ambil full width di baris sendiri */
    min-width: 100%;
    margin-bottom: 8px;
    background: white;
    border: 1.5px solid #dde9e2;
    border-radius: 14px;
    padding: 10px 12px;
    font-size: 0.95rem;
    outline: none;
}

        .custom-label-input:focus {
            border-color: #0f7b54;
            box-shadow: 0 0 0 3px rgba(15, 123, 84, 0.1);
        }

        /* Total Card */
        .total-card {
            background: linear-gradient(135deg, #f1f9f5 0%, #e3f0ea 100%);
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #0f7b54;

        .total-row {
            display: flex;

            align-items: center;
            margin-bottom: 8px;
        }

        .total-label {

            font-size: 1.1rem;

        }

        .total-amount {
            font-weight: 800;
            font-size: 1.8rem;

            letter-spacing: -0.5px;
        }

        .total-currency {
            font-size: 1rem;
            color: #2e5e45;
            margin-left: 4px;
        }

        /* Radio Method */
        .radio-group {
            display: flex;
            gap: 24px;
            margin: 16px 0 8px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: #2b4f3d;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            accent-color: #0f7b54;
            width: 18px;
            height: 18px;
        }

        /* Buttons */
        .btn {
            border: none;
            border-radius: 30px;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: #0f7b54;
            color: white;
            box-shadow: 0 6px 14px rgba(15, 123, 84, 0.25);
            border: 1px solid #0b6845;
        }

        .btn-primary:hover {
            background: #0b6845;
            transform: scale(1.01);
        }

        .btn-secondary {
            background: #ffffff;
            color: #1e4d37;
            border: 1.5px solid #c6dbd2;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #f0f9f4;
        }

        .btn-small {
            padding: 12px 16px;
            font-size: 0.85rem;
            width: auto;
        }

        /* Current Number Card */
        .current-number-card {
            background: linear-gradient(135deg, #0f5e44 0%, #1a7a5c 100%);
            color: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 12px 24px -8px rgba(10, 80, 50, 0.3);

        .current-number-label {
            font-size: 0.9rem;

            font-weight: 500;
        }

        .current-number-value {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;

        .current-number-unit {
            font-size: 0.9rem;
            opacity: 0.8;

        .current-number-action {
            background: rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
        }

        /* Data List */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 4px 12px;
        }

        .list-header h3 {
            font-weight: 600;
            color: #1e3a2f;
            font-size: 1.1rem;
        }

        .data-item {
            background: #ffffff;
            border-radius: 24px;
            padding: 18px 16px;
            margin-bottom: 12px;
            border: 1px solid #e2ebe6;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.15s;
        }

        .data-item:hover {
            border-color: #b8d5c8;
            box-shadow: 0 4px 12px rgba(0,70,40,0.03);
        }

        .item-row1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .invoice-badge {
            background: #e3f1eb;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #0b543b;
            letter-spacing: 0.3px;
        }

        .item-amount {
            font-weight: 700;
            color: #0a452f;
            font-size: 1.1rem;
        }

        .item-details {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #3b5f4d;
            align-items: center;
        }

        .item-details i {
            color: #0f7b54;
            width: 16px;
        }

        .item-jenis-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .item-jenis-badge {
            background: #e3f1eb;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #0b543b;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 6px;
        }

        .item-actions button {
            background: #f0f7f3;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;

            font-size: 1rem;

            border: 1px solid #d0e2d9;
        }

        .item-actions button:hover {
            background: #dff0e8;
        }

        .empty-message {
            text-align: center;
            padding: 36px 20px;
            background: #f1f9f5;
            border-radius: 32px;
            color: #547a66;
            font-size: 0.95rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #547a66;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 12px;
            color: #0f7b54;
        }

        /* Search Input */
        #searchInput {
            padding: 14px 18px;
            font-size: 1rem;
        }

        /* ────────────────────────────────────────────────
        Global Loading Overlay - Full Glassmorphism, NO BOX
        ───────────────────────────────────────────────── */
        .global-loading {
            position: fixed;
            inset: 0;
            background: rgba(248, 250, 252, 0.45);         /* warna body + transparan lebih tinggi */
            backdrop-filter: blur(12px);                    /* blur kuat untuk efek glass */
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .global-loading.active {
            display: flex;
            opacity: 1;
        }

        .loading-content {
            text-align: center;
            padding: 24px 40px;                             /* padding lebih kecil karena tanpa border */
            /* Hilangkan semua background, border, shadow, backdrop-filter di sini */
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
        }

        .loading-logo {
            width: 140px;                                   /* sedikit lebih besar agar menonjol */
            height: 100px;
            object-fit: contain;
            margin-bottom: 16px;
            
            /* Animasi tetap: denyut lambat + kedip halus */
            animation: 
                pulse-slow 4.5s ease-in-out infinite,
                subtle-glow 7s ease-in-out infinite;
        }

        .loading-text {
            color: #0f7b54;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(15, 123, 84, 0.3); /* sedikit shadow agar lebih terbaca di blur */
        }

        /* Denyut lambat */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.15); }
        }

        /* Kedip sangat halus + brightness */
        @keyframes subtle-glow {
            0%, 100% { opacity: 0.9; filter: brightness(1); }
            50%      { opacity: 1;   filter: brightness(1.18); }
        }


        .input-group small {
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 4px;
            display: block;
        }
    </style>
</head>

    <div class="app-container">
        <!-- Loading Overlay (tanpa box dalam) -->
        <div id="globalLoading" class="global-loading">
            <div class="loading-content">
                <img src="https://i.ibb.co/5XnDzfNS/Asset-3.png" alt="Loading Logo" class="loading-logo">
                <div class="loading-text">Sabar yak...</div>
            </div>
        </div>

        <!-- Header -->
        <div class="app-header">
            <div class="logo-kiri"></div>
            <div class="header-titles">
                <h1>Data Muzakki 2026</h1>
                <div class="sub">
                    <span class="badge"><i class="fas fa-leaf"></i> WAZIQOH KMB Mesir</span>
                    <span><i class="far fa-clock"></i> <span id="liveTime"></span></span>
                </div>
            </div>
        </div>

        <!-- Current Number Card -->
        <div class="current-number-card" id="currentNumberCard">
            <div>
                <div class="current-number-label">Nomor Invoice Terakhir</div>
                <div style="display: flex; align-items: baseline;">
                    <span class="current-number-value" id="lastInvoiceNumber">000</span>
                    <span class="current-number-unit">/2026</span>
                </div>
            </div>
            <div class="current-number-action" id="refreshNumberBtn">
                <i class="fas fa-sync-alt"></i> <span>Refresh</span>
            </div>
        </div>

        <!-- Form Input Card -->
        <div class="card">
            <div class="form-title">
                <i class="fas fa-pen-alt"></i> Form Transaksi Baru
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-user"></i> NAMA LENGKAP</label>
                <input type="text" class="input-field" id="namaInput" placeholder="Contoh: Ahmad Fauzi" value="">
            </div>

            <div class="input-group">
                <label><i class="fas fa-users"></i> KEKELUARGAAN</label>
                <input type="text" class="input-field" id="kekeluargaanInput" placeholder="KMB" value="KMB">
                <small style="color: #64748b; font-size: 0.75rem; margin-left: 8px; margin-top: 4px; display: block;">
                    *Gunakan singkatan misal : KMB
                </small>
            </div>

            <div>
                <label style="margin-left: 8px; font-size: 0.8rem; font-weight: 600; color: #2b4f3d;">JENIS PEMBAYARAN</label>
                <div class="payment-types" id="jenisGroup">
                    <span class="type-chip" data-type="Zakat Fitrah"><i class="fas fa-hand-holding-heart"></i> Zakat Fitrah</span>
                    <span class="type-chip" data-type="Shodaqoh"><i class="fas fa-gift"></i> Shodaqoh</span>
                    <span class="type-chip" data-type="Infaq"><i class="fas fa-coins"></i> Infaq</span>
                    <span class="type-chip" data-type="Wakaf"><i class="fas fa-mosque"></i> Wakaf</span>
                    <span class="type-chip" data-type="Lainnya"><i class="fas fa-ellipsis-h"></i> Lainnya</span>
                </div>
            </div>

            <!-- Nominal per Jenis -->
            <div class="nominal-group" id="nominalGroup">
                <div class="nominal-group" id="nominalGroup">
                    <div class="nominal-row" data-type="Zakat Fitrah" style="display: none;">
                        <span class="nominal-label">Zakat Fitrah</span>
                        <div class="nominal-input">
                            <input type="text" id="nominalZakat" class="nominal-field" placeholder="0.00" value="">  <!-- type="text" & value="" -->
                            <select id="currencyZakat" class="currency-select">
                                <option value="EGP" selected>EGP</option>
                                <option value="IDR">IDR</option>
                            </select>
                        </div>
                    </div>
                    <div class="nominal-row" data-type="Shodaqoh" style="display: none;">
                        <span class="nominal-label">Shodaqoh</span>
                        <div class="nominal-input">
                            <input type="text" id="nominalShodaqoh" class="nominal-field" placeholder="0.00" value="">  <!-- type="text" & value="" -->
                            <select id="currencyShodaqoh" class="currency-select">
                                <option value="EGP" selected>EGP</option>
                                <option value="IDR">IDR</option>
                            </select>
                        </div>
                    </div>
                    <div class="nominal-row" data-type="Infaq" style="display: none;">
                        <span class="nominal-label">Infaq</span>
                        <div class="nominal-input">
                            <input type="text" id="nominalInfaq" class="nominal-field" placeholder="0.00" value="">  <!-- type="text" & value="" -->
                            <select id="currencyInfaq" class="currency-select">
                                <option value="EGP" selected>EGP</option>
                                <option value="IDR">IDR</option>
                            </select>
                        </div>
                    </div>
                    <div class="nominal-row" data-type="Wakaf" style="display: none;">

                            <select id="currencyLainnya" class="currency-select">

                <div>Memuat data...</div>

    <!-- Modal Preview Kwitansi -->
    <div id="previewModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6);">

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="margin: 0; color: #0f7b54;">Preview Kwitansi</h3>
                <span id="closePreviewModal" style="color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            </div>
            <div id="previewContainer" style="border: 1px solid #ddd; background: white; padding: 10px; overflow: auto; max-height: 60vh; margin-bottom: 16px;">

            </div>

                <button id="cancelPreviewBtn" class="btn btn-secondary" style="margin-right: 8px;">Tutup</button>
                <button id="downloadFromPreviewBtn" class="btn btn-primary">Download PDF</button>

    <script>
        // ============================================
        // KONFIGURASI APPS SCRIPT ENDPOINT
        // ============================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwTh0vJfVQSFCqWZjn6fPc4vjBTlJCDqqV_KELPteH07ptRmqfqewEOgXE1gQrws-aP/exec';

        let payments = [];
        let selectedJenis = [];
        let nominalValues = {
            'Zakat Fitrah': {nominal: 0, currency: 'EGP'},
            'Shodaqoh': {nominal: 0, currency: 'EGP'},
            'Infaq': {nominal: 0, currency: 'EGP'},
            'Wakaf': {nominal: 0, currency: 'EGP'},
            'Lainnya': {nominal: 0, currency: 'EGP', customLabel: ''}
            
        };
        let kekeluargaan = 'KMB'; // default value

        // Load data on start
        window.onload = function() {
            loadAllData();
            updateLiveTime();
            setInterval(updateLiveTime, 1000);
            
            document.getElementById('refreshNumberBtn').addEventListener('click', function() {
                loadAllData();
            });

            // Setup listeners untuk nominal inputs dan currency selects
            setupNominalListeners();

            // Fitur Search Riwayat
            document.getElementById('searchInput').addEventListener('input', function() {
                const searchTerm = this.value.trim().toLowerCase();
                renderFilteredList(searchTerm);
            });
        };

        // Fitur Search Riwayat
        document.getElementById('searchInput').addEventListener('input', function() {
            const searchTerm = this.value.trim().toLowerCase();
            renderFilteredList(searchTerm);
        });

        // Fungsi global untuk menampilkan/sembunyikan loading
        function showGlobalLoading(show = true) {
            const loader = document.getElementById('globalLoading');
            if (!loader) return;
            
            if (show) {
                loader.classList.add('active');
            } else {
                loader.classList.remove('active');
            }
        }

        function setupNominalListeners() {
            const nominalFields = document.querySelectorAll('.nominal-field');
            nominalFields.forEach(field => {
                // Saat fokus: tampilkan raw
                field.addEventListener('focus', function() {
                    this.value = unformatNumber(this.value).toString().replace('.', ',');
                });

                // Saat ketik: format real-time
                field.addEventListener('input', function() {
                    let value = this.value.replace(/[^0-9,]/g, '');
                    if ((value.match(/,/g) || []).length > 1) {
                        value = value.slice(0, value.lastIndexOf(',')) + value.slice(value.lastIndexOf(',') + 1);
                    }

                    const raw = unformatNumber(value);
                    const hasDecimal = value.includes(',');
                    this.value = formatNumber(raw, hasDecimal);

                    // Mapping type yang benar
                    let type = this.id.replace('nominal', '');
                    if (type === 'Zakat') type = 'Zakat Fitrah';
                    if (type === 'Shodaqoh') type = 'Shodaqoh';  // sudah benar
                    if (type === 'Infaq') type = 'Infaq';
                    if (type === 'Wakaf') type = 'Wakaf';
                    if (type === 'Lainnya') type = 'Lainnya';

                    if (nominalValues[type]) {
                        nominalValues[type].nominal = raw;
                        updateTotal();
                    } else {
                        console.warn('Type tidak ditemukan:', type);
                    }
                });

                // Saat blur: format final
                field.addEventListener('blur', function() {
                    const raw = unformatNumber(this.value);
                    this.value = formatNumber(raw);

                    let type = this.id.replace('nominal', '');
                    if (type === 'Zakat') type = 'Zakat Fitrah';

                    if (nominalValues[type]) {
                        nominalValues[type].nominal = raw;
                        updateTotal();
                    }
                });
            });

            // Listener currency (fix assignment error + mapping)
            const currencySelects = document.querySelectorAll('.currency-select');
            currencySelects.forEach(select => {
                select.addEventListener('change', function() {
                    let type = this.id.replace('currency', '');
                    if (type === 'Zakat') type = 'Zakat Fitrah';

                    if (nominalValues[type]) {
                        nominalValues[type].currency = this.value;  // ← sekarang aman
                        updateTotal();
                    } else {
                        console.warn('Currency type tidak ditemukan:', type);
                    }
                });
            });

            // Custom label
            const customLabel = document.getElementById('customLabelLainnya');
            if (customLabel) {
                customLabel.addEventListener('input', function() {
                    nominalValues['Lainnya'].customLabel = this.value.trim() || 'Lainnya';
                });
            }
        }

        function updateTotal() {
            const totals = {};
            for (let type in nominalValues) {
                if (selectedJenis.includes(type) && nominalValues[type].nominal > 0) {
                    const curr = nominalValues[type].currency;
                    if (!totals[curr]) totals[curr] = 0;
                    totals[curr] += nominalValues[type].nominal;
                }
            }

            const totalAmountsDiv = document.getElementById('totalAmounts');
            totalAmountsDiv.innerHTML = '';
            
            if (Object.keys(totals).length === 0) {
                totalAmountsDiv.innerHTML = '<div class="total-row"><span class="total-amount">0</span><span class="total-currency">EGP</span></div>';
                return;
            }

            for (let curr in totals) {
                const amount = totals[curr];
                const formatted = formatNumber(amount); // otomatis hilang .00 jika bulat
                
                const row = document.createElement('div');
                row.className = 'total-row';
                row.innerHTML = `
                    <span class="total-amount">${formatted}</span>
                    <span class="total-currency">${curr}</span>
                `;
                totalAmountsDiv.appendChild(row);
            }
        }

        function updateLiveTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('liveTime').innerText = timeStr;
        }

        // ============================================
        // FUNGSI MEMBACA DATA DARI APPS SCRIPT
        // ============================================
        async function loadAllData() {
            showGlobalLoading(true);  // gunakan global loading biar konsisten

            try {
                const response = await fetch(APPS_SCRIPT_URL + '?action=getAll');
                const result = await response.json();
                
                if (result.success && result.data) {
                    payments = result.data;
                    
                    // SORTING DIBALIK: terbaru di atas (descending timestamp)
                    payments.sort((a, b) => {
                        const timeA = a.timestamp ? new Date(a.timestamp) : new Date(0);
                        const timeB = b.timestamp ? new Date(b.timestamp) : new Date(0);
                        return timeB - timeA;  // ← ini yang diubah: timeB - timeA (baru → lama)
                    });
                } else {
                    payments = [];
                }
                
                renderFilteredList(''); 
                updateLastInvoiceNumber();
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('dataListContainer').innerHTML = 
                    '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i><br>Gagal memuat data. Periksa koneksi ke server.</div>';
            } finally {
                showGlobalLoading(false);
            }
        }

        function showLoading(show) {
            if (show) {
                document.getElementById('dataListContainer').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><div>Memuat data...</div></div>';
            }
        }

        function updateLastInvoiceNumber() {
            if (payments.length === 0) {
                document.getElementById('lastInvoiceNumber').innerText = '000';
                return;
            }
            
            let maxNum = 0;
            payments.forEach(p => {
                if (p.invoiceNumber) {
                    const match = p.invoiceNumber.match(/INV\/2026\/(\d+)/);
                    if (match) {
                        const num = parseInt(match[1], 10);
                        if (num > maxNum) maxNum = num;
                    }
                }
            });
            document.getElementById('lastInvoiceNumber').innerText = maxNum.toString().padStart(3, '0');  // ← ubah jadi 3
        }

        function formatNumber(num, forceDecimal = false) {
            if (num === '' || num === null || isNaN(num)) return '';
            const n = parseFloat(num);
            if (isNaN(n)) return '';
            
            let [integer, decimal = ''] = n.toString().split('.');
            integer = integer.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            
            if (decimal || forceDecimal) {
                decimal = decimal.padEnd(2, '0').slice(0, 2);
                return `${integer},${decimal}`;
            }
            return integer;
        }

        function unformatNumber(str) {
            if (!str) return 0;
            const cleaned = str.replace(/\./g, '').replace(/,/g, '.');
            return parseFloat(cleaned) || 0;
        }

        // Render list
        function renderList() {
            const container = document.getElementById('dataListContainer');
            if (!payments.length) {
                container.innerHTML = '<div class="empty-message"><i class="fas fa-inbox fa-3x" style="opacity:0.5; margin-bottom:12px;"></i><br>Belum ada data transaksi.<br>Tambahkan transaksi baru.</div>';
                document.getElementById('totalCount').innerText = '0 data';
                return;
            }

            let html = '';
            payments.forEach((p, idx) => {
                let jenisBadges = '';
                let totalStr = '';
                const totals = {};
                if (Array.isArray(p.jenis)) {
                    p.jenis.forEach(j => {
                        const type = j.type || j.customLabel || 'Unknown';
                        const nominal = j.nominal || 0;
                        const curr = j.currency || 'EGP';
                        if (!totals[curr]) totals[curr] = 0;
                        totals[curr] += nominal;
                        jenisBadges += `<span class="item-jenis-badge">${type}: ${formatNumber(nominal)} ${curr}</span>`;
                    });
                }
                for (let curr in totals) {
                    totalStr += `${formatNumber(totals[curr])} ${curr} `;
                }

                html += `<div class="data-item" data-index="${idx}">
                    <div class="item-row1">
                        <span class="invoice-badge">${p.invoiceNumber || 'INV/....'}</span>
                        <span class="item-amount">${totalStr}</span>
                    </div>
                    <div class="item-details">
                        <span><i class="fas fa-user"></i> ${p.nama || '-'}</span>
                        <span><i class="fas fa-users"></i> ${p.kekeluargaan || 'KMB'}</span>
                        <span><i class="fas fa-wallet"></i> ${p.metode || 'Tunai'}</span>
                    </div>
                    <div class="item-jenis-list">
                        ${jenisBadges}
                    </div>
                    <div class="item-actions">
                        <button onclick="editEntry('${p.invoiceNumber}')" title="Edit"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteEntry('${p.invoiceNumber}')" title="Hapus"><i class="fas fa-trash-alt"></i></button>
                        <button onclick="downloadKwitansi('${p.invoiceNumber}')" title="Unduh PDF"><i class="fas fa-file-pdf"></i></button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            document.getElementById('totalCount').innerText = payments.length + ' data';
        }

        // Fungsi render list dengan filter search
function renderFilteredList(searchTerm = '') {
    const container = document.getElementById('dataListContainer');
    
    if (!payments.length) {
        container.innerHTML = '<div class="empty-message"><i class="fas fa-inbox fa-3x" style="opacity:0.5; margin-bottom:12px;"></i><br>Belum ada data transaksi.</div>';
        document.getElementById('totalCount').innerText = '0 data';
        return;
    }

    // Filter data
    const filteredPayments = payments.filter(p => {
        const invoiceLower = (p.invoiceNumber || '').toLowerCase();
        const namaLower = (p.nama || '').toLowerCase();
        return invoiceLower.includes(searchTerm) || namaLower.includes(searchTerm);
    });

    if (!filteredPayments.length) {
        container.innerHTML = '<div class="empty-message"><i class="fas fa-search fa-3x" style="opacity:0.5; margin-bottom:12px;"></i><br>Tidak ditemukan data yang cocok.</div>';
        document.getElementById('totalCount').innerText = '0 hasil';
        return;
    }

    let html = '';
    filteredPayments.forEach((p, idx) => {
        let jenisBadges = '';
        let totalStr = '';
        const totals = {};
        if (Array.isArray(p.jenis)) {
            p.jenis.forEach(j => {
                const type = j.type || j.customLabel || 'Unknown';
                const nominal = j.nominal || 0;
                const curr = j.currency || 'EGP';
                if (!totals[curr]) totals[curr] = 0;
                totals[curr] += nominal;
                jenisBadges += `<span class="item-jenis-badge">${type}: ${formatNumber(nominal)} ${curr}</span>`;
            });
        }
        for (let curr in totals) {
            totalStr += `${formatNumber(totals[curr])} ${curr} `;
        }

        html += `<div class="data-item" data-index="${idx}">
            <div class="item-row1">
                <span class="invoice-badge">${p.invoiceNumber || 'INV/....'}</span>
                <span class="item-amount">${totalStr}</span>
            </div>
            <div class="item-details">
                <span><i class="fas fa-user"></i> ${p.nama || '-'}</span>
                <span><i class="fas fa-users"></i> ${p.kekeluargaan || 'KMB'}</span>
                <span><i class="fas fa-wallet"></i> ${p.metode || 'Tunai'}</span>
            </div>
            <div class="item-jenis-list">
                ${jenisBadges}
            </div>
            <div class="item-actions">
                <button onclick="editEntry('${p.invoiceNumber}')" title="Edit"><i class="fas fa-edit"></i></button>
                <button onclick="deleteEntry('${p.invoiceNumber}')" title="Hapus"><i class="fas fa-trash-alt"></i></button>
                <button onclick="downloadKwitansi('${p.invoiceNumber}')" title="Unduh PDF"><i class="fas fa-file-pdf"></i></button>
            </div>
        </div>`;
    });

    container.innerHTML = html;
    document.getElementById('totalCount').innerText = `${filteredPayments.length} hasil`;
}

        // Payment type chip selector
        document.querySelectorAll('.type-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                const type = this.dataset.type;
                
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selectedJenis = selectedJenis.filter(t => t !== type);
                    
                    // Sembunyikan input nominal
                    const row = document.querySelector(`.nominal-row[data-type="${type}"]`);
                    if (row) {
                        row.style.display = 'none';
                        const input = row.querySelector('.nominal-field');
                        if (input) {
                            input.disabled = true;
                            input.value = '0';
                            nominalValues[type].nominal = 0;
                        }
                        if (type === 'Lainnya') {
                            const custom = document.getElementById('customLabelLainnya');
                            custom.disabled = true;
                            custom.value = '';
                            nominalValues[type].customLabel = '';
                        }
                    }
                } else {
                    this.classList.add('selected');
                    selectedJenis.push(type);
                    
                    // Tampilkan input nominal
                    const row = document.querySelector(`.nominal-row[data-type="${type}"]`);
                    if (row) {
                        row.style.display = 'flex';
                        const input = row.querySelector('.nominal-field');
                        if (input) {
                            input.disabled = false;
                            input.value = '0';
                        }
                        if (type === 'Lainnya') {
                            const custom = document.getElementById('customLabelLainnya');
                            custom.disabled = false;
                        }
                    }
                }
                
                updateTotal();
            });
        });

        // Save data
        document.getElementById('simpanBtn').addEventListener('click', async function() {
            const nama = document.getElementById('namaInput').value.trim();
            if (!nama) { alert('Nama wajib diisi'); return; }
            
            const kekeluargaan = document.getElementById('kekeluargaanInput').value.trim();
            if (!kekeluargaan) {
                alert('Kekeluargaan wajib diisi');
                return;
            }
            const metode = document.querySelector('input[name="metode"]:checked').value;
            const editInvoice = document.getElementById('editInvoice').value;

            const activeJenis = selectedJenis.filter(type => nominalValues[type].nominal > 0);
            
            if (activeJenis.length === 0) {
                alert('Pilih minimal satu jenis pembayaran dengan nominal > 0');
                return;
            }

            const now = new Date();
            const timestamp = now.toISOString();

            let invoiceNumber = editInvoice;
            if (!invoiceNumber) {
                let maxNum = 0;
                payments.forEach(p => {
                    if (p.invoiceNumber) {
                        const match = p.invoiceNumber.match(/INV\/2026\/(\d+)/);
                        if (match) {
                            const num = parseInt(match[1], 10);
                            if (num > maxNum) maxNum = num;
                        }
                    }
                });
                const nextNumber = (maxNum + 1).toString().padStart(3, '0');
                invoiceNumber = `INV/2026/${nextNumber}`;
            }

            const jenisWithDetails = activeJenis.map(type => ({
                type: type === 'Lainnya' ? (nominalValues[type].customLabel || 'Lainnya') : type,
                nominal: nominalValues[type].nominal,
                currency: nominalValues[type].currency
            }));

            showGlobalLoading(true);

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'save');
                formData.append('editMode', editInvoice ? '1' : '-1');
                formData.append('invoiceNumber', invoiceNumber);
                formData.append('nama', nama);
                formData.append('jenis', JSON.stringify(jenisWithDetails));
                formData.append('metode', metode);
                formData.append('timestamp', editInvoice ? payments.find(p => p.invoiceNumber === editInvoice)?.timestamp || timestamp : timestamp);
                formData.append('kekeluargaan', kekeluargaan);

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const result = await response.json();
                console.log('Hasil simpan:', result);

                if (result.success) {
                    alert('✅ Data berhasil disimpan!');
                    resetForm();
                    setTimeout(() => loadAllData(), 800);
                } else {
                    alert('Gagal menyimpan: ' + (result.message || result.error || 'Unknown error'));
                }
                
            } catch (error) {
                console.error('Error simpan:', error);
                alert('❌ Gagal menyimpan: ' + error.message);
            } finally {
                showGlobalLoading(false);
            }
        });

        // Edit entry
        window.editEntry = function(invoiceNumber) {
            const payment = payments.find(p => p.invoiceNumber === invoiceNumber);
            if (!payment) return;

            document.getElementById('namaInput').value = payment.nama || '';
            document.getElementById('kekeluargaanInput').value = payment.kekeluargaan || 'KMB';
                kekeluargaan = payment.kekeluargaan || 'KMB';
            
            document.querySelector(`input[name="metode"][value="${payment.metode}"]`).checked = true;
            
            // Reset semua chip dan nominal
            document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('selected'));
            document.querySelectorAll('.nominal-row').forEach(row => {
                row.style.display = 'none';
                const input = row.querySelector('.nominal-field');
                if (input) {
                    input.disabled = true;
                    input.value = '0';
                }
                const custom = row.querySelector('.custom-label-input');
                if (custom) {
                    custom.disabled = true;
                    custom.value = '';
                }
            });
            
            selectedJenis = [];
            nominalValues = {
                'Zakat Fitrah': {nominal: 0, currency: 'EGP'},
                'Shodaqoh': {nominal: 0, currency: 'EGP'},
                'Infaq': {nominal: 0, currency: 'EGP'},
                'Wakaf': {nominal: 0, currency: 'EGP'},
                'Lainnya': {nominal: 0, currency: 'EGP', customLabel: ''}
            };
            
            // Set nilai dari payment
            if (Array.isArray(payment.jenis)) {
                payment.jenis.forEach(item => {
                    let type = item.type;
                    let isLainnya = false;
                    if (!['Zakat Fitrah', 'Shodaqoh', 'Infaq', 'Wakaf'].includes(type)) {
                        type = 'Lainnya';
                        isLainnya = true;
                    }
                    
                    // Aktifkan chip
                    const chip = document.querySelector(`.type-chip[data-type="${type}"]`);
                    if (chip && !selectedJenis.includes(type)) {
                        chip.classList.add('selected');
                        selectedJenis.push(type);
                        
                        // Tampilkan dan set nominal
                        const row = document.querySelector(`.nominal-row[data-type="${type}"]`);
                        if (row) {
                            row.style.display = 'flex';
                            const input = row.querySelector('.nominal-field');
                            if (input) {
                                input.disabled = false;
                                input.value = item.nominal;
                                nominalValues[type].nominal = item.nominal;
                            }
                            const select = row.querySelector('.currency-select');
                            if (select) {
                                select.value = item.currency;
                                nominalValues[type].currency = item.currency;
                            }
                            if (isLainnya) {
                                const custom = document.getElementById('customLabelLainnya');
                                custom.value = item.type;
                                custom.disabled = false;
                                nominalValues[type].customLabel = item.type;
                            }

            if (!confirm('Hapus data ini? Nomor invoice akan diurut ulang otomatis (proses latar).')) return;

            showGlobalLoading(true);

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'delete');
                formData.append('invoiceNumber', invoiceNumber);

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    // Langsung beri feedback sukses & hilangkan loading
                    alert('✅ Data berhasil dihapus! Nomor invoice sedang diurut ulang di latar belakang.');
                    
                    // Refresh list dulu (biar user lihat data sudah berkurang)
                    await loadAllData();   // ini cepat karena cache lokal masih ada

                    // Renumber di background → tidak tunggu
                    renumberInvoicesInBackground();  

                    resetForm();
                } else {
                    alert('Gagal menghapus: ' + (result.message || result.error || 'Unknown error'));
                }
                
            } catch (error) {
                console.error('Error hapus:', error);
                alert('❌ Gagal menghapus: ' + error.message);
            } finally {
                showGlobalLoading(false);   // loading hilang secepat mungkin setelah hapus sukses/gagal
            }
        };

        async function renumberInvoicesInBackground() {
            try {
                const response = await fetch(APPS_SCRIPT_URL + '?action=getAll');
                const result = await response.json();
                if (!result.success || !result.data) return;

                let paymentsLocal = result.data;
                
                // SORTING DIBALIK: terbaru di atas
                paymentsLocal.sort((a, b) => {
                    const timeA = a.timestamp ? new Date(a.timestamp) : new Date(0);
                    const timeB = b.timestamp ? new Date(b.timestamp) : new Date(0);
                    return timeB - timeA;  // ← terbaru dulu
                });

                const updates = paymentsLocal.map((p, index) => {
                    const newNumber = (index + 1).toString().padStart(3, '0');
                    const newInvoice = `INV/2026/${newNumber}`;
                    return { invoiceNumber: p.invoiceNumber, newInvoiceNumber: newInvoice };
                });

                const formData = new URLSearchParams();
                formData.append('action', 'renumber');
                formData.append('updates', JSON.stringify(updates));

                fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                }).then(res => res.json())
                .then(r => {
                    if (r.success) {
                        console.log('Renumber background selesai');
                        setTimeout(loadAllData, 1500);
                    } else {
                        console.warn('Renumber background gagal:', r);
                    }
                })
                .catch(err => console.error('Renumber background error:', err));

            } catch (err) {
                console.error('Background renumber gagal fetch:', err);
            }
        }

        // Fungsi renumber invoice setelah hapus (agar nomor bergeser otomatis)
        async function renumberInvoices() {
            try {
                // Ambil semua data terbaru dulu
                await loadAllData();  // pastikan payments sudah update

                // Urutkan payments berdasarkan timestamp (agar urutan logis)
                payments.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                // Siapkan batch update ke Apps Script (POST multiple)
                const updates = payments.map((p, index) => {
                    const newNumber = (index + 1).toString().padStart(3, '0');
                    const newInvoice = `INV/2026/${newNumber}`;
                    return { invoiceNumber: p.invoiceNumber, newInvoiceNumber: newInvoice };
                });

                // Kirim ke Apps Script untuk batch update
                const formData = new URLSearchParams();
                formData.append('action', 'renumber');
                formData.append('updates', JSON.stringify(updates));

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const result = await response.json();
                if (result.success) {
                    console.log('Renumber berhasil:', result.message);
                    await loadAllData();  // refresh data setelah renumber
                } else {
                    console.error('Renumber gagal:', result.message);
                }
            } catch (error) {
                console.error('Error renumber:', error);
            }
        }

        // FUNGSI TERBILANG (Mendukung Multi-Mata Uang)
        
        function numberToWordsIndonesia(num) {
            console.log('[TERBILANG VERSION] Fungsi terbilang versi CLEAN dipanggil untuk num:', num);
            if (num == 0 || num == null || isNaN(num)) return 'nol';

            num = Math.round(Math.abs(num));

            const satuan  = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan'];
            const belasan = ['sepuluh', 'sebelas', 'dua belas', 'tiga belas', 'empat belas', 'lima belas', 
                            'enam belas', 'tujuh belas', 'delapan belas', 'sembilan belas'];
            const puluhan = ['', '', 'dua puluh', 'tiga puluh', 'empat puluh', 'lima puluh', 
                            'enam puluh', 'tujuh puluh', 'delapan puluh', 'sembilan puluh'];

            function convert(n) {
                if (n === 0) return '';

                if (n < 10) return satuan[n];

                if (n < 20) return belasan[n - 10];

                if (n < 100) {
                    const p = Math.floor(n / 10);
                    const s = n % 10;
                    let result = puluhan[p];
                    if (s > 0) result += (result ? ' ' : '') + satuan[s];
                    return result;
                }

                if (n < 200) {
                    let result = 'seratus';
                    const sisa = n - 100;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                if (n < 1000) {
                    const r = Math.floor(n / 100);
                    let result = satuan[r] + ' ratus';
                    const sisa = n % 100;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                if (n < 2000) {
                    let result = 'seribu';
                    const sisa = n - 1000;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                if (n < 1000000) {
                    let result = convert(Math.floor(n / 1000)) + ' ribu';
                    const sisa = n % 1000;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                if (n < 1000000000) {
                    let result = convert(Math.floor(n / 1000000)) + ' juta';
                    const sisa = n % 1000000;
                    if (sisa > 0) result += ' ' + convert(sisa);
                    return result;
                }

                return n.toString();
            }

            return convert(num);
        }

        function numberToWords(num) {
            if (!num) return 'nol';
            const angka = Math.round(Math.abs(num));
            if (angka === 0) return 'nol';
            if (angka < 12) {
                const satuan = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan', 'sepuluh', 'sebelas'];
                return satuan[angka];
            }
            if (angka < 20) return numberToWords(angka-10) + ' belas';
            if (angka < 100) return numberToWords(Math.floor(angka/10)) + ' puluh ' + numberToWords(angka%10);
            if (angka < 1000) return numberToWords(Math.floor(angka/100)) + ' ratus ' + numberToWords(angka%100);
            return angka.toString();
        }
